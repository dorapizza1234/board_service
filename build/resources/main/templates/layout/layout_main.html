<!DOCTYPE html>
<html th:fragment="layout(title, content)"
      lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title th:replace="${title}">Board Service</title>

  <!-- SockJS / Stomp (실시간 알림) -->
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <!-- Bootstrap -->
  <link rel="stylesheet" th:href="@{/finalProject_3/bootstrap-4.6.2-dist/css/bootstrap.min.css}">

  <!-- finalProject_3 공통 CSS (게이트웨이 통해 서빙) -->
  <link rel="stylesheet" th:href="@{/finalProject_3/css/header.css}">
  <link rel="stylesheet" th:href="@{/finalProject_3/css/footer.css}">

  <!-- jQuery -->
  <script th:src="@{/finalProject_3/js/jquery-3.7.1.min.js}"></script>

  <script>
    function toggleChatPopup() {
      const modal = document.getElementById('chatModal');
      if (modal) {
        modal.style.display = (modal.style.display === 'none' || modal.style.display === '') ? 'block' : 'none';
      }
    }
  </script>
</head>
<body>
<div id="mycontainer">
  <div id="myheader" th:insert="~{fragment/header :: main_header}"></div>

  <main class="container mt-4">
    <div th:replace="${content}"></div>
  </main>

  <div id="myfooter" th:insert="~{fragment/footer :: footer}"></div>
</div>

<script defer th:src="@{/finalProject_3/js/header.js}"></script>
<script th:src="@{/finalProject_3/bootstrap-4.6.2-dist/js/bootstrap.bundle.min.js}"></script>

<script>
  // 쿠키 → localStorage 동기화
  (function syncJwt() {
    const cookie = document.cookie.split(';')
      .map(c => c.trim())
      .find(c => c.startsWith('accessToken='));
    if (cookie) {
      const token = cookie.split('=')[1];
      localStorage.setItem('accessToken', token);
    }
  })();

  // fetch 전역 인터셉터: Authorization 헤더 자동 추가
  const _origFetch = window.fetch;
  window.fetch = function(input, init = {}) {
    const token = localStorage.getItem('accessToken');
    if (token) {
      init.headers = Object.assign({ 'Authorization': 'Bearer ' + token }, init.headers || {});
    }
    return _origFetch(input, init);
  };
</script>
</body>
</html>
