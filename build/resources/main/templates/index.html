<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{layout/layout_main :: layout(~{::title}, ~{::main})}">
<head>
    <title>Board Service - 홈</title>
</head>
<body>
<main>
    <div class="jumbotron">
        <h1 class="display-4">Board Service</h1>
        <p class="lead">공지사항, FAQ, 1:1 문의 서비스입니다.</p>
        <hr class="my-4">
        <div class="row mt-4">
            <div class="col-md-6 mb-3">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">공지사항 / FAQ</h5>
                        <p class="card-text">최신 공지사항과 자주 묻는 질문을 확인하세요.</p>
                        <a th:href="@{/board-service/notice/list}" class="btn btn-primary">바로가기</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-3" sec:authorize="isAuthenticated()">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">1:1 문의</h5>
                        <p class="card-text">궁금한 사항을 1:1로 문의하세요.</p>
                        <a th:href="@{/board-service/inquiry/list}" class="btn btn-success">바로가기</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-3" sec:authorize="!isAuthenticated()">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">1:1 문의</h5>
                        <p class="card-text">1:1 문의는 로그인 후 이용 가능합니다.</p>
                        <span class="btn btn-secondary disabled">로그인 필요</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
