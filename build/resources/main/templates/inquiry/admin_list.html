<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{layout/layout_main :: layout(~{::title}, ~{::main})}">
<head>
    <title>문의 관리 (관리자)</title>
</head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>전체 문의 목록 (관리자)</h3>
        <span class="text-muted">총 <strong th:text="${totalCount}"></strong>건</span>
    </div>

    <!-- 상태 필터 -->
    <form method="get" th:action="@{/board-service/inquiry/admin/list}" class="mb-3 d-flex gap-2 align-items-center">
        <label class="me-1 fw-bold">상태:</label>
        <select name="status" class="form-control" style="width:150px;" onchange="this.form.submit()">
            <option value="ALL" th:selected="${selectedStatus == 'ALL'}">전체</option>
            <option value="대기" th:selected="${selectedStatus == '대기'}">대기</option>
            <option value="답변완료" th:selected="${selectedStatus == '답변완료'}">답변완료</option>
        </select>
    </form>

    <table class="table table-hover table-bordered">
        <thead class="thead-dark">
            <tr>
                <th style="width:60px;">번호</th>
                <th>제목</th>
                <th style="width:180px;">문의자</th>
                <th style="width:100px;">상태</th>
                <th style="width:120px;">작성일</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(inquiryList)}">
                <td colspan="5" class="text-center text-muted">등록된 문의가 없습니다.</td>
            </tr>
            <tr th:each="inquiry, stat : ${inquiryList}">
                <td th:text="${(currentPage - 1) * 15 + stat.index + 1}"></td>
                <td>
                    <a th:href="@{/board-service/inquiry/view(inquiryId=${inquiry.inquiryId})}"
                       th:text="${inquiry.title}" class="text-dark"></a>
                </td>
                <td th:text="${inquiry.memberEmail}"></td>
                <td>
                    <span th:text="${inquiry.inquiryStatus}"
                          th:class="${inquiry.inquiryStatus == '답변완료'} ? 'badge badge-success' : 'badge badge-secondary'">
                    </span>
                </td>
                <td th:text="${inquiry.createdAt}"></td>
            </tr>
        </tbody>
    </table>

    <!-- 페이징 네비게이션 -->
    <nav th:if="${totalPages > 1}" aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/board-service/inquiry/admin/list(page=${currentPage-1}, status=${selectedStatus})}">이전</a>
            </li>
            <li class="page-item" th:each="p : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${p == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/board-service/inquiry/admin/list(page=${p}, status=${selectedStatus})}"
                   th:text="${p}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/board-service/inquiry/admin/list(page=${currentPage+1}, status=${selectedStatus})}">다음</a>
            </li>
        </ul>
    </nav>
</main>
</body>
</html>
