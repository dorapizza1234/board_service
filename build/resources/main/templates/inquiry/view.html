<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{layout/layout_main :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${inquiry.title}">문의 상세</title>
</head>
<body>
<main>
    <h3 class="mb-4">1:1 문의 상세</h3>

    <!-- 문의 내용 -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong th:text="${inquiry.title}"></strong>
            <span th:text="${inquiry.inquiryStatus}"
                  th:class="${inquiry.inquiryStatus == '답변완료'} ? 'badge badge-success' : 'badge badge-secondary'">
            </span>
        </div>
        <div class="card-body">
            <p class="text-muted small mb-2">
                작성자: <span th:text="${inquiry.memberEmail}"></span>
                &nbsp;|&nbsp; 작성일: <span th:text="${inquiry.createdAt}"></span>
            </p>
            <hr>
            <p th:text="${inquiry.content}" style="white-space: pre-wrap; min-height: 150px;"></p>
        </div>
    </div>

    <!-- 관리자 답변 영역 -->
    <div class="card mb-4" th:if="${inquiry.adminAnswer != null and !#strings.isEmpty(inquiry.adminAnswer)}">
        <div class="card-header bg-success text-white">
            <strong>관리자 답변</strong>
            <small class="ml-2" th:text="${inquiry.answeredAt}"></small>
        </div>
        <div class="card-body">
            <p th:text="${inquiry.adminAnswer}" style="white-space: pre-wrap;"></p>
        </div>
    </div>

    <!-- 관리자 답변 입력 폼 -->
    <div class="card mb-4" sec:authorize="hasRole('ADMIN')">
        <div class="card-header bg-warning">
            <strong>답변 작성 (관리자)</strong>
        </div>
        <div class="card-body">
            <div class="form-group">
                <textarea class="form-control" id="adminAnswer" rows="5"
                          placeholder="답변을 입력하세요"
                          th:text="${inquiry.adminAnswer}"></textarea>
            </div>
            <button type="button" class="btn btn-warning"
                    th:onclick="'saveAnswer(' + ${inquiry.inquiryId} + ')'">답변 저장</button>
        </div>
    </div>

    <a th:href="@{/board-service/inquiry/list}" class="btn btn-secondary">목록</a>
    <a th:href="@{/board-service/inquiry/admin/list}" class="btn btn-secondary ml-2"
       sec:authorize="hasRole('ADMIN')">관리자 목록</a>

    <script>
    function saveAnswer(inquiryId) {
        const adminAnswer = document.getElementById('adminAnswer').value.trim();
        if (!adminAnswer) { alert('답변 내용을 입력하세요.'); return; }

        const token = localStorage.getItem('accessToken');
        const formData = new FormData();
        formData.append('inquiryId', inquiryId);
        formData.append('adminAnswer', adminAnswer);

        fetch('/board-service/inquiry/admin/answer', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
        })
        .then(res => res.json())
        .then(result => {
            if (result === 1) {
                alert('답변이 저장되었습니다.');
                location.reload();
            } else {
                alert('저장 실패. 다시 시도하세요.');
            }
        });
    }
    </script>
</main>
</body>
</html>
