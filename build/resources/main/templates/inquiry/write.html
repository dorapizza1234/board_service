<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{layout/layout_main :: layout(~{::title}, ~{::main})}">
<head>
    <title>1:1 문의 작성</title>
</head>
<body>
<main>
    <h3 class="mb-4">1:1 문의 작성</h3>
    <form id="inquiryWriteForm">
        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" class="form-control" id="title" name="title"
                   placeholder="문의 제목을 입력하세요" required maxlength="200">
        </div>
        <div class="form-group">
            <label for="content">내용</label>
            <textarea class="form-control" id="content" name="content"
                      rows="10" placeholder="문의 내용을 상세히 입력하세요" required></textarea>
        </div>
        <div class="d-flex justify-content-between">
            <a th:href="@{/board-service/inquiry/list}" class="btn btn-secondary">취소</a>
            <button type="button" class="btn btn-primary" onclick="submitInquiry()">문의 등록</button>
        </div>
    </form>

    <script>
    function submitInquiry() {
        const title = document.getElementById('title').value.trim();
        const content = document.getElementById('content').value.trim();
        if (!title) { alert('제목을 입력하세요.'); return; }
        if (!content) { alert('내용을 입력하세요.'); return; }

        const token = localStorage.getItem('accessToken');
        const formData = new FormData();
        formData.append('title', title);
        formData.append('content', content);

        fetch('/board-service/inquiry/write', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
        })
        .then(res => res.json())
        .then(result => {
            if (result === 1) {
                alert('문의가 등록되었습니다.');
                window.location.href = '/board-service/inquiry/list';
            } else {
                alert('등록 실패. 다시 시도하세요.');
            }
        });
    }
    </script>
</main>
</body>
</html>
