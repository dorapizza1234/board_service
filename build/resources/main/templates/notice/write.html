<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{layout/layout_main :: layout(~{::title}, ~{::main})}">
<head>
    <title>공지사항 작성</title>
</head>
<body>
<main>
    <h3 class="mb-4">공지사항 / FAQ 작성</h3>
    <form id="writeForm">
        <div class="form-group">
            <label for="noticeType">유형</label>
            <select class="form-control" id="noticeType" name="noticeType">
                <option value="NOTICE">공지사항</option>
                <option value="FAQ">FAQ</option>
            </select>
        </div>
        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" class="form-control" id="title" name="title"
                   placeholder="제목을 입력하세요" required maxlength="400">
        </div>
        <div class="form-group">
            <label for="content">내용</label>
            <textarea class="form-control" id="content" name="content"
                      rows="10" placeholder="내용을 입력하세요" required></textarea>
        </div>
        <div class="form-group form-check">
            <input type="checkbox" class="form-check-input" id="importance" name="importance" value="1">
            <label class="form-check-label" for="importance">중요 공지 (상단 고정)</label>
        </div>
        <div class="d-flex justify-content-between">
            <a th:href="@{/board-service/notice/list}" class="btn btn-secondary">취소</a>
            <button type="button" class="btn btn-primary" onclick="submitWrite()">등록</button>
        </div>
    </form>

    <script>
    function submitWrite() {
        const title = document.getElementById('title').value.trim();
        const content = document.getElementById('content').value.trim();
        if (!title) { alert('제목을 입력하세요.'); return; }
        if (!content) { alert('내용을 입력하세요.'); return; }

        const importanceEl = document.getElementById('importance');
        const token = localStorage.getItem('accessToken');

        const formData = new FormData();
        formData.append('title', title);
        formData.append('content', content);
        formData.append('noticeType', document.getElementById('noticeType').value);
        formData.append('importance', importanceEl.checked ? '1' : '0');

        fetch('/board-service/notice/write', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
        })
        .then(res => res.json())
        .then(result => {
            if (result === 1) {
                alert('등록되었습니다.');
                window.location.href = '/board-service/notice/list';
            } else {
                alert('등록 실패. 다시 시도하세요.');
            }
        });
    }
    </script>
</main>
</body>
</html>
