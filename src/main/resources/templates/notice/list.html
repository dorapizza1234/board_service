<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{layout/layout_main :: layout(~{::title}, ~{::main})}">
<head>
    <title>공지임다/ FAQ</title>
</head>
<body>
<main>
    <div style="max-width:1100px; margin:0 auto; padding: 40px 24px 80px;">

        <!-- ===== 공지사항 섹션 ===== -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <span style="display:inline-flex; align-items:center; justify-content:center;
                             width:36px; height:36px; background:#222; border-radius:8px;">
                    <i class="fas fa-bullhorn" style="color:#fff; font-size:15px;"></i>
                </span>
                <h4 style="margin:0; font-weight:700; font-size:20px;">테스트</h4>
            </div>
            <a th:href="@{/board-service/notice/write}"
               sec:authorize="hasRole('ADMIN')"
               style="background:#222; color:#fff; border:none; padding:7px 16px;
                      border-radius:6px; font-size:13px; font-weight:600; text-decoration:none;">
                + 글쓰기
            </a>
        </div>

        <div style="border:1px solid #e8e8e8; border-radius:10px; overflow:hidden; margin-bottom:32px;">
            <table class="table table-hover mb-0" style="margin:0;">
                <thead style="background:#f7f7f7;">
                    <tr>
                        <th style="width:70px; padding:12px 16px; font-size:13px; color:#555; border-bottom:2px solid #e8e8e8;">번호</th>
                        <th style="padding:12px 16px; font-size:13px; color:#555; border-bottom:2px solid #e8e8e8;">제목</th>
                        <th style="width:110px; padding:12px 16px; font-size:13px; color:#555; border-bottom:2px solid #e8e8e8; text-align:center;">작성일</th>
                        <th style="width:70px; padding:12px 16px; font-size:13px; color:#555; border-bottom:2px solid #e8e8e8; text-align:center;">조회</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(noticeList)}">
                        <td colspan="4" style="padding:40px; text-align:center; color:#aaa; font-size:14px;">
                            등록된 공지사항이 없습니다.
                        </td>
                    </tr>
                    <tr th:each="notice, stat : ${noticeList}"
                        th:style="${notice.importance == 1} ? 'background:#fffbf0;' : ''">
                        <td style="padding:13px 16px; font-size:13px; color:#888;" th:text="${stat.index + 1}"></td>
                        <td style="padding:13px 16px;">
                            <span th:if="${notice.importance == 1}"
                                  style="display:inline-block; background:#f59e0b; color:#fff;
                                         font-size:11px; font-weight:700; padding:2px 7px;
                                         border-radius:4px; margin-right:6px; vertical-align:middle;">중요</span>
                            <a th:href="@{/board-service/notice/view(noticeId=${notice.noticeId})}"
                               th:text="${notice.title}"
                               style="color:#222; font-size:14px; font-weight:500; text-decoration:none;"></a>
                        </td>
                        <td style="padding:13px 16px; font-size:13px; color:#888; text-align:center;" th:text="${notice.createdAt}"></td>
                        <td style="padding:13px 16px; font-size:13px; color:#888; text-align:center;" th:text="${notice.viewCount}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이징 -->
        <nav th:if="${totalPages > 1}" aria-label="Notice page navigation" style="margin-bottom:48px;">
            <ul class="pagination justify-content-center" style="margin:0;">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/board-service/notice/list(page=${currentPage-1})}">이전</a>
                </li>
                <li class="page-item" th:each="p : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${p == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/board-service/notice/list(page=${p})}" th:text="${p}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/board-service/notice/list(page=${currentPage+1})}">다음</a>
                </li>
            </ul>
        </nav>

        <!-- ===== FAQ 섹션 ===== -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <span style="display:inline-flex; align-items:center; justify-content:center;
                             width:36px; height:36px; background:#3b82f6; border-radius:8px;">
                    <i class="fas fa-question" style="color:#fff; font-size:15px;"></i>
                </span>
                <h4 style="margin:0; font-weight:700; font-size:20px;">테스트</h4>
            </div>
            <a th:href="@{/board-service/notice/write}"
               sec:authorize="hasRole('ADMIN')"
               style="background:#3b82f6; color:#fff; border:none; padding:7px 16px;
                      border-radius:6px; font-size:13px; font-weight:600; text-decoration:none;">
                + FAQ 등록
            </a>
        </div>

        <div id="faqAccordion" style="margin-bottom:48px;">
            <div th:if="${#lists.isEmpty(faqList)}"
                 style="text-align:center; color:#aaa; padding:40px; border:1px solid #e8e8e8;
                        border-radius:10px; font-size:14px;">
                등록된 FAQ가 없습니다.
            </div>
            <div th:each="faq, stat : ${faqList}"
                 style="border:1px solid #e8e8e8; border-radius:10px; margin-bottom:8px; overflow:hidden;">
                <div style="background:#fff;">
                    <div style="display:flex; align-items:center; justify-content:space-between; padding:4px 20px 4px 4px;">
                        <button class="btn btn-link collapsed"
                                type="button"
                                data-toggle="collapse"
                                th:data-target="${'#faqCollapse' + stat.index}"
                                aria-expanded="false"
                                style="padding:12px 16px; text-decoration:none; display:flex;
                                       align-items:center; gap:12px; color:#222; font-weight:600;
                                       font-size:14px; border:none; flex:1; text-align:left;">
                            <span style="display:inline-flex; align-items:center; justify-content:center;
                                         width:26px; height:26px; background:#3b82f6; border-radius:50%;
                                         color:#fff; font-size:13px; font-weight:700; flex-shrink:0;">Q</span>
                            <span th:text="${faq.title}"></span>
                        </button>
                        <div sec:authorize="hasRole('ADMIN')" style="display:flex; gap:6px; flex-shrink:0;">
                            <a th:href="@{/board-service/notice/edit(noticeId=${faq.noticeId})}"
                               style="display:inline-block; background:#f1f1f1; color:#444; font-size:12px;
                                      font-weight:600; padding:5px 12px; border-radius:5px; text-decoration:none;">
                                수정
                            </a>
                            <button type="button"
                                    th:onclick="'deleteFaq(' + ${faq.noticeId} + ')'"
                                    style="background:#ef4444; color:#fff; border:none; font-size:12px;
                                           font-weight:600; padding:5px 12px; border-radius:5px; cursor:pointer;">
                                삭제
                            </button>
                        </div>
                    </div>
                </div>
                <div th:id="${'faqCollapse' + stat.index}"
                     class="collapse"
                     th:attr="aria-labelledby=${'faqHeading' + stat.index}"
                     data-parent="#faqAccordion">
                    <div style="padding:16px 20px; background:#f8faff; border-top:1px solid #e8e8e8;
                                display:flex; align-items:flex-start; gap:12px;">
                        <span style="display:inline-flex; align-items:center; justify-content:center;
                                     width:26px; height:26px; background:#10b981; border-radius:50%;
                                     color:#fff; font-size:13px; font-weight:700; flex-shrink:0; margin-top:1px;">A</span>
                        <span th:text="${faq.content}" style="white-space:pre-wrap; font-size:14px; color:#444; line-height:1.6;"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== 1:1 질문하기 섹션 ===== -->
        <div style="background:linear-gradient(135deg, #1e1e1e 0%, #3a3a3a 100%);
                    border-radius:14px; padding:36px 40px;
                    display:flex; justify-content:space-between; align-items:center; gap:20px;">
            <div>
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                    <i class="fas fa-headset" style="color:#fff; font-size:22px;"></i>
                    <h4 style="margin:0; color:#fff; font-weight:700; font-size:20px;">1:1 문의하기</h4>
                </div>
                <p style="margin:0; color:#aaa; font-size:14px; line-height:1.6;">
                    FAQ에서 해결되지 않은 문제가 있으신가요?<br>
                    1:1 문의를 남겨주시면 빠르게 답변드리겠습니다.
                </p>
            </div>
            <div style="flex-shrink:0;">
                <th:block sec:authorize="isAuthenticated()">
                    <a th:href="@{/board-service/inquiry/write}"
                       style="display:inline-block; background:#fff; color:#222; font-weight:700;
                              font-size:14px; padding:12px 28px; border-radius:8px;
                              text-decoration:none; white-space:nowrap;">
                        문의하기 →
                    </a>
                </th:block>
                <th:block sec:authorize="isAnonymous()">
                    <a th:href="@{/finalProject_3/security/login}"
                       style="display:inline-block; background:#fff; color:#222; font-weight:700;
                              font-size:14px; padding:12px 28px; border-radius:8px;
                              text-decoration:none; white-space:nowrap;">
                        로그인 후 문의하기 →
                    </a>
                </th:block>
            </div>
        </div>

    </div>

    <script>
    function deleteFaq(noticeId) {
        if (!confirm('FAQ를 삭제하시겠습니까?')) return;
        const token = localStorage.getItem('accessToken');
        fetch('/board-service/notice/delete?noticeId=' + noticeId, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(result => {
            if (result === 1) {
                alert('삭제되었습니다.');
                location.reload();
            } else {
                alert('삭제 실패');
            }
        });
    }
    </script>
</main>
</body>
</html>
